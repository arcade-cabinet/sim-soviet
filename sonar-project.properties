# SonarCloud configuration for SimSoviet 1917
# https://sonarcloud.io/project/overview?id=arcade-cabinet_sim-soviet

sonar.projectKey=arcade-cabinet_sim-soviet
sonar.organization=arcade-cabinet

# Source directories
sonar.sources=src
sonar.tests=__tests__

# Only analyze TypeScript and JavaScript
sonar.language=ts

# Coverage from Jest (LCOV format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  __tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.d.ts,\
  dist/**,\
  archive/**,\
  coverage/**,\
  node_modules/**

# Don't flag duplication in tests
sonar.cpd.exclusions=\
  __tests__/**

# Test file patterns
sonar.test.inclusions=\
  __tests__/**/*.test.ts,\
  __tests__/**/*.test.tsx

# Game systems are inherently complex state machines
sonar.javascript.cognitive-complexity.threshold=25

# SonarCloud's default JS/TS profile is too noisy for this R3F game codebase:
# - React Three Fiber intrinsic JSX props are reported as unknown React props.
# - Gameplay, audio, and VFX pseudorandomness is non-security-sensitive.
# - Biome + TypeScript own project style and type-shape rules locally.
sonar.issue.ignore.multicriteria=\
  r1,r2,r3,r4,r5,r6,r7,r8,r9,r10,\
  r11,r12,r13,r14,r15,r16,r17,r18,r19,r20,\
  r21,r22,r23,r24,r25,r26,r27,r28,r29
sonar.issue.ignore.multicriteria.r1.ruleKey=typescript:S6747
sonar.issue.ignore.multicriteria.r1.resourceKey=src/**/*.tsx
