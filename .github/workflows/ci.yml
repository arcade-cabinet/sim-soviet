name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          lfs: true

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run linter
        run: |
          echo "::group::Running linter"
          pnpm run lint 2>&1 | tee lint-output.log
          EXIT_CODE="${PIPESTATUS[0]}"
          echo "::endgroup::"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Linting failed with exit code $EXIT_CODE"
            echo "### Linting Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Exit code: $EXIT_CODE" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -100 lint-output.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit "$EXIT_CODE"
          fi
          echo "Linting passed successfully"

      - name: Run TypeScript type checking
        run: |
          echo "::group::Running TypeScript type checking"
          pnpm run typecheck 2>&1 | tee check-output.log
          EXIT_CODE="${PIPESTATUS[0]}"
          echo "::endgroup::"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Type checking failed with exit code $EXIT_CODE"
            echo "### Type Checking Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Exit code: $EXIT_CODE" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -100 check-output.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit "$EXIT_CODE"
          fi
          echo "Type checking completed"

      - name: Run tests with coverage
        run: |
          echo "::group::Running tests with coverage"
          pnpm run test:coverage 2>&1 | tee test-output.log
          EXIT_CODE="${PIPESTATUS[0]}"
          echo "::endgroup::"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Tests failed with exit code $EXIT_CODE"
            echo "### Tests Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Exit code: $EXIT_CODE" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -100 test-output.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit "$EXIT_CODE"
          fi
          echo "### Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          grep -A 999 "^-\+|" test-output.log >> "$GITHUB_STEP_SUMMARY" || echo "Coverage table not found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Tests passed successfully"

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Build project
        run: |
          echo "::group::Building project"
          pnpm run build 2>&1 | tee build-output.log
          EXIT_CODE="${PIPESTATUS[0]}"
          echo "::endgroup::"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Build failed with exit code $EXIT_CODE"
            echo "### Build Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Exit code: $EXIT_CODE" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -100 build-output.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit "$EXIT_CODE"
          fi
          echo "Build completed successfully"

      - name: Upload build artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist
          path: dist/
          retention-days: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          lfs: true

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: pnpm run build

      - name: Copy static assets into dist
        run: |
          mkdir -p dist/assets
          cp -r assets/models dist/assets/models
          cp -r assets/hdri dist/assets/hdri
          cp -r assets/textures dist/assets/textures
          cp -r assets/audio dist/assets/audio

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: success() || failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload visual playtest screenshots
        if: success() || failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: visual-playtest-screenshots
          path: e2e/screenshots/
          retention-days: 14
          if-no-files-found: ignore

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check all jobs
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [ "$QUALITY_RESULT" != "success" ]; then
            echo "Quality checks failed"
            exit 1
          fi
          if [ "$E2E_RESULT" != "success" ]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All checks passed successfully!"
