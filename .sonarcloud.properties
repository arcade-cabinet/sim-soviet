# SonarCloud Automatic Analysis configuration for SimSoviet 1917.
# CI-based scanner configuration remains in sonar-project.properties.

sonar.organization=arcade-cabinet
sonar.projectKey=arcade-cabinet_sim-soviet
sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=__tests__,e2e
sonar.test.inclusions=__tests__/**/*.test.ts,__tests__/**/*.test.tsx,e2e/**/*.test.ts,e2e/**/*.browser.test.ts

sonar.exclusions=**/node_modules/**,**/dist/**,**/archive/**,**/coverage/**,**/.github/**,**/assets/**,**/public/**,**/*.d.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.cpd.exclusions=__tests__/**,e2e/**
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Automatic analysis runs Sonar's broad default profile, which is noisy for
# React Three Fiber intrinsic props and simulation/VFX code. Biome, TypeScript,
# Jest, Vitest browser, smoke E2E, and CodeQL remain the release gates for this
# branch; these rules are retained in sonar-project.properties for a future
# CI-based Sonar setup with project-owned thresholds.
sonar.issue.ignore.multicriteria=r1,r2,r3,r4,r5,r6,r7,r8,r9,r10,r11,r12,r13,r14,r15,r16,r17,r18,r19,r20,r21,r22,r23,r24,r25,r26,r27,r28,r29
